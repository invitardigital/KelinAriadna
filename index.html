new WOW().init();


document.addEventListener("DOMContentLoaded", () => {
  const elementos = document.querySelectorAll(".observado");
  const animando = new Set();
  const yaAnimado = new WeakMap();
  const timeoutLimpieza = new WeakMap();

  elementos.forEach(el => {
    const anims = [...el.classList].filter(c =>
      c.startsWith("animate__") && c !== "animate__animated"
    );
    el.dataset.animations = anims.join(" ");
    el.classList.remove("animate__animated", ...anims);
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const el = entry.target;
      const anims = el.dataset.animations.split(" ").filter(Boolean);
      const tieneControl = el.dataset.control === 'true';

      if (entry.isIntersecting) {
        if (animando.has(el) || yaAnimado.get(el) === 'animando') return;

        if (timeoutLimpieza.has(el)) {
          clearTimeout(timeoutLimpieza.get(el));
          timeoutLimpieza.delete(el);
        }

        animando.add(el);
        yaAnimado.set(el, 'animando');
        
        if (tieneControl) {
          el.style.opacity = '1';
          el.style.transform = 'none';
        }
        
        el.classList.add("animate__animated", ...anims);
        
        const limpiar = () => {
          if (timeoutLimpieza.has(el)) {
            clearTimeout(timeoutLimpieza.get(el));
            timeoutLimpieza.delete(el);
          }
          
          animando.delete(el);
          yaAnimado.set(el, false); // 🔥 false en vez de dejar 'animando'
          el.classList.remove("animate__animated", ...anims);
          
          if (tieneControl) {
            el.style.opacity = '0';
          } else {
            el.style.transform = 'none';
            el.style.opacity = '1';
          }
        };
        
        const timeout = setTimeout(() => limpiar(), 2500);
        timeoutLimpieza.set(el, timeout);
        
        el.addEventListener("animationend", () => limpiar(), { once: true });

      } else {
        if (animando.has(el)) return;
        
        yaAnimado.set(el, false);
        el.classList.remove("animate__animated", ...anims);
        
        if (tieneControl) {
          el.style.transform = 'none';
          el.style.opacity = '0';
        } else {
          el.style.transform = 'none';
          el.style.opacity = '1';
        }
      }
    });
  }, {
    threshold: 0.05,
    rootMargin: "50px"
  });

  elementos.forEach(el => observer.observe(el));
});



let muted = false;
$('#sound,#play').click(() => {

    muted = !muted;
    if (muted) {
        audio.play();
    } else {
        audio.pause();
    }
    $('#sound').find('img').attr('src', muted ? 'sound.svg' : 'sound_mute.svg');

});

document.getElementById("sello").addEventListener("click", function() {

    let paginaIzq = document.getElementById('pagina-izq');
    let paginaDer = document.getElementById('pagina-der');
    paginaIzq.style.transform = 'rotateY(-90deg)';
    paginaDer.style.transform = 'rotateY(90deg)';
    document.getElementById("sello").classList.remove("animate__infinite","animate__pulse");
    document.getElementById("sello").classList.add("animate__animated", "animate__fadeOut");
    $(window).scrollTop(0);
    setTimeout(() => {

        $('body').css('overflow-y', 'auto');


        muted = !muted;

        $('#sound').find('img').attr('src', muted ? 'sound.svg' : 'sound_mute.svg');

});
